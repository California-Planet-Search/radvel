<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RadVel</title>
    <link rel="icon" type="image/x-icon" href="/ui/favicon.ico" />
    <link rel="stylesheet" href="/ui/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800 min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="#/runs" class="flex items-center gap-3">
          <img src="/ui/radvel_logo.png" alt="RadVel" class="h-8 w-auto" />
          <span class="text-xs text-slate-400 font-mono" id="version-tag"></span>
        </a>
        <nav class="text-sm text-slate-500 flex gap-4">
          <a href="#/runs" class="hover:text-slate-900">Runs</a>
          <a href="#/runs/new" class="hover:text-slate-900">New run</a>
          <a href="/docs" target="_blank" class="hover:text-slate-900">API docs</a>
        </nav>
      </div>
    </header>
    <main id="app" class="max-w-6xl mx-auto px-6 py-8">
      <div class="text-slate-400">Loading…</div>
    </main>
    <footer class="text-center text-xs text-slate-400 py-6">
      RadVel HTTP service. Set <code>RADVEL_API_ENABLE_UI=false</code> to disable.
    </footer>
    <script type="module" src="/ui/app.js"></script>
  </body>
</html>
