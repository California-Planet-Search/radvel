name: CI

on:
  push:
    branches:
      - main
      - master
      - next-release
      - github-actions
  pull_request:
    branches:
      - main
      - master
      - next-release
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, 3.11, 3.12, 3.13]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc git pkg-config libhdf5-hl-100 libhdf5-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        # Install celerite to test if it resolves GP covariance matrix issues
        pip install celerite
        pip install coveralls pytest pytest-cov coverage

    - name: Install build dependencies
      run: |
        pip install Cython pybind11 setuptools wheel hatchling

    - name: Build and test
      run: |
        pip install -e .
        # Ensure example data path is available to tests
        export RADVEL_DATADIR="$GITHUB_WORKSPACE/example_data"
        python -c "import os; p=os.environ.get('RADVEL_DATADIR'); print('RADVEL_DATADIR=', p); import radvel; print('radvel.DATADIR=', radvel.DATADIR)"
        python -c "import radvel._kepler; print('C extension _kepler available')"
        # Debug: Check Python version and pytest version
        python --version
        pytest --version
        # Debug: Check if tests can be collected
        pytest radvel --collect-only -q
        # Run tests with more verbose output
        pytest radvel --cov=radvel --cov-report=term-missing -v --tb=long

    - name: Upload coverage to Coveralls
      if: matrix.python-version == '3.9' && github.actor != 'dependabot[bot]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      continue-on-error: true
      run: |
        coverage xml
        coveralls

  api-test:
    needs: test
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc git pkg-config libhdf5-hl-100 libhdf5-dev

    - name: Install Python dependencies (with [api] extra)
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        pip install celerite
        pip install Cython pybind11 setuptools wheel hatchling
        pip install -e ".[api,dev-api]" pytest pytest-cov coverage

    - name: Run API integration tests
      run: |
        export RADVEL_DATADIR="$GITHUB_WORKSPACE/example_data"
        python -c "import radvel._kepler; print('C extension _kepler available')"
        pytest radvel -m api -v --tb=long

  docker-smoke:
    needs: test
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Build radvel-api image (load into local docker)
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true
        tags: radvel-api:smoke
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Boot the container
      run: |
        # Use a named docker volume rather than a host bind-mount so the
        # non-root operator inside the image (uid 10001) can actually
        # write to /data. Host bind-mounts overlay the chowned /data with
        # a host-owned dir and the lifespan crashes with EACCES.
        docker run -d --name rv -p 8000:8000 -v rv-data:/data radvel-api:smoke
        # Wait for /healthz to come up — fail fast if it never does.
        for i in $(seq 1 30); do
          if curl --fail --silent http://localhost:8000/healthz; then echo; break; fi
          sleep 2
        done
        curl --fail --silent http://localhost:8000/healthz

    - name: Verify /ui mounted
      run: |
        curl --fail --silent http://localhost:8000/ui | grep -q '<title>RadVel</title>'

    - name: Run end-to-end smoke
      run: |
        python radvel/api/tests/scripts/smoke_e2e.py http://localhost:8000

    - name: Container logs (always)
      if: always()
      run: docker logs rv || true

    - name: Tear down
      if: always()
      run: docker rm -f rv || true

    - name: Image size budget
      run: |
        size_mb=$(docker image inspect radvel-api:smoke --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
        echo "image size: ${size_mb} MiB"
        if [ "$size_mb" -gt 2048 ]; then
          echo "FAIL: image size ${size_mb} MiB exceeds 2 GiB budget"
          exit 1
        fi

  build-wheels:
    needs: test
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Pre-cache virtualenv for cibuildwheel
      shell: bash
      run: |
        pip install virtualenv
        VENV_VERSION=$(python -c "import virtualenv; print(virtualenv.__version__)")
        echo "virtualenv version: $VENV_VERSION"

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.22
      env:
        CIBW_BUILD: cp39-* cp311-* cp312-* cp313-*
        CIBW_SKIP: "*-musllinux_*"
        CIBW_BUILD_VERBOSITY: 1
        CIBW_BEFORE_BUILD: pip install Cython numpy setuptools
        CIBW_TEST_SKIP: "*"
        CIBW_DEPENDENCY_VERSIONS: latest

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  build-sdist:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build sdist
      run: |
        python -m pip install build
        python -m build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_TOKEN }}
